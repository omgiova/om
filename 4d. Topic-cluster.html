<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>O que pesquisam — Topic Cluster · Marketing de Conteúdo · Open Mídia Digital</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #f0edf8;
      color: #1a1a2e;
      padding: 28px 16px 80px;
      min-height: 100vh;
    }

    /* ── HEADER ── */
    header { text-align: center; margin-bottom: 28px; }
    .eyebrow {
      font-size: 10px; font-weight: 700; letter-spacing: .12em;
      text-transform: uppercase; color: #F97316; margin-bottom: 6px;
    }
    h1 { font-size: 18px; font-weight: 800; color: #2D1060; }
    .subtitle { font-size: 11px; color: #888; margin-top: 4px; }

    /* ── LEGEND ── */
    .legend {
      display: flex; flex-wrap: wrap; gap: 8px;
      justify-content: center; margin-bottom: 24px;
    }
    .leg { display: flex; align-items: center; gap: 5px; font-size: 11px; color: #555; }
    .leg-dot { width: 10px; height: 10px; border-radius: 3px; flex-shrink: 0; }

    /* ── TREE WRAPPER ── */
    .tree { max-width: 560px; margin: 0 auto; display: flex; flex-direction: column; align-items: center; }

    /* ── PILLAR ── */
    .pillar {
      background: #fff; color: #2D1060;
      border-radius: 8px; padding: 7px 16px;
      text-align: center; font-size: 13px; font-weight: 800;
      box-shadow: 0 3px 10px rgba(45,16,96,.15);
      border: 2px solid #2D1060;
    }
    .pillar .sub { font-size: 9px; font-weight: 500; opacity: .55; margin-top: 1px; display: block; }

    /* vertical connector from pillar down */
    .pillar::after {
      content: ''; display: block;
      width: 2px; height: 24px;
      background: #c4b5e8;
      margin: 0 auto;
    }

    /* ── CLUSTER LIST ── */
    .cluster-list {
      list-style: none;
      border-left: 2px solid #c4b5e8;
      margin-left: 20px;
      padding-left: 0;
    }

    /* ── CLUSTER ITEM ── */
    .cluster-item { position: relative; margin-bottom: 6px; }

    /* horizontal arm from border to node */
    .cluster-item::before {
      content: ''; position: absolute;
      left: 0; top: 18px;
      width: 18px; height: 2px;
      background: #c4b5e8;
    }

    /* ── CLUSTER NODE (button) ── */
    .cluster-btn {
      display: flex; align-items: center; justify-content: space-between;
      gap: 8px;
      margin-left: 18px;
      width: calc(100% - 18px);
      border: none; border-radius: 9px;
      padding: 9px 12px;
      font-size: 13px; font-weight: 700;
      cursor: pointer; text-align: left;
      transition: filter .15s, transform .1s;
      color: #fff;
    }
    .cluster-btn:hover { filter: brightness(1.1); transform: translateX(2px); }
    .cluster-btn .label { flex: 1; line-height: 1.3; }
    .cluster-btn .right { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
    .cluster-btn .badge {
      font-size: 9px; font-weight: 700; letter-spacing: .06em;
      text-transform: uppercase; opacity: .8;
    }
    .cluster-btn .arrow {
      font-size: 10px; transition: transform .2s; display: inline-block;
    }
    .cluster-btn.open .arrow { transform: rotate(90deg); }

    /* priority colors */
    .p1 { background: #2D1060; }
    .p2 { background: #F97316; }
    .p3 { background: #22C55E; }
    .p4 { background: #8B5CF6; }
    .p5 { background: #94a3b8; }

    /* ── CLUSTER BODY (keywords + subclusters) ── */
    .cluster-body {
      display: none;
      margin-left: 18px;
      padding: 6px 0 4px 12px;
      border-left: 2px solid #e2d9f3;
    }
    .cluster-body.open { display: block; }

    /* ── KEYWORD ITEM ── */
    .kw-item {
      background: #fff; border-radius: 7px;
      padding: 6px 10px; margin-bottom: 5px;
      font-size: 11px; border-left: 3px solid #e2d9f3;
      line-height: 1.4;
    }
    .kw-item .kw-text { font-weight: 600; color: #1a1a2e; display: block; }
    .kw-tags { display: flex; gap: 4px; margin-top: 3px; flex-wrap: wrap; }
    .tag {
      font-size: 9px; font-weight: 700; letter-spacing: .05em;
      text-transform: uppercase; padding: 2px 6px; border-radius: 4px;
    }
    .tag-info  { background: #dbeafe; color: #1d4ed8; }
    .tag-comp  { background: #fef3c7; color: #b45309; }
    .tag-trans { background: #dcfce7; color: #166534; }
    .tag-tofu  { background: #f3e8ff; color: #7e22ce; }
    .tag-mofu  { background: #ffedd5; color: #c2410c; }
    .tag-bofu  { background: #d1fae5; color: #065f46; }

    /* ── SUBCLUSTER LIST ── */
    .sub-list {
      list-style: none;
      border-left: 2px solid #c4b5e8;
      margin: 8px 0 4px 4px;
      padding-left: 0;
    }
    .sub-item { position: relative; margin-bottom: 5px; }
    .sub-item::before {
      content: ''; position: absolute;
      left: 0; top: 16px;
      width: 14px; height: 2px;
      background: #c4b5e8;
    }
    .sub-btn {
      display: flex; align-items: center; justify-content: space-between;
      gap: 6px;
      margin-left: 14px;
      width: calc(100% - 14px);
      border: none; border-radius: 7px;
      padding: 7px 10px;
      font-size: 11px; font-weight: 700;
      cursor: pointer; text-align: left;
      color: #fff;
      transition: filter .15s;
    }
    .sub-btn:hover { filter: brightness(1.1); }
    .sub-btn .label { flex: 1; }
    .sub-btn .arrow { font-size: 9px; transition: transform .2s; display: inline-block; }
    .sub-btn.open .arrow { transform: rotate(90deg); }

    .sub-body {
      display: none;
      margin-left: 14px;
      padding: 5px 0 2px 10px;
      border-left: 2px solid #e2d9f3;
    }
    .sub-body.open { display: block; }

    /* hint */
    .hint { text-align: center; font-size: 11px; color: #aaa; margin-bottom: 16px; }
  </style>
</head>
<body>

<header>
  <div class="eyebrow">Open Mídia Digital · Estratégia SEO</div>
  <h1>O que pesquisam</h1>
  <p class="subtitle">Topic Cluster · Palavra-chave pilar: Marketing de Conteúdo</p>
</header>

<div class="legend">
  <div class="leg"><div class="leg-dot" style="background:#2D1060"></div>P1 – Pilar</div>
  <div class="leg"><div class="leg-dot" style="background:#F97316"></div>P2 – Alta prioridade</div>
  <div class="leg"><div class="leg-dot" style="background:#22C55E"></div>P3 – Média prioridade</div>
  <div class="leg"><div class="leg-dot" style="background:#8B5CF6"></div>P4 – Oportunidade</div>
  <div class="leg"><div class="leg-dot" style="background:#94a3b8"></div>P5 – Tendência</div>
</div>

<p class="hint">▶ clique num cluster para expandir</p>

<div class="tree" id="tree">
  <div class="pillar">
    Marketing de Conteúdo
    <span class="sub">Palavra-chave pilar · alto volume</span>
  </div>
  <ul class="cluster-list" id="cluster-list"></ul>
</div>

<script>
const data = [
  {
    label: "Estratégia de Conteúdo", priority: "p1", badge: "P1",
    keywords: [
      { text: "como criar estratégia de conteúdo", intent: "info", funnel: "tofu" },
      { text: "planejamento de conteúdo para redes sociais", intent: "info", funnel: "tofu" },
      { text: "linha editorial para Instagram", intent: "info", funnel: "mofu" },
      { text: "calendário de conteúdo mensal", intent: "info", funnel: "mofu" },
      { text: "estratégia de conteúdo para Instagram", intent: "info", funnel: "tofu" },
    ],
    subclusters: [
      {
        label: "Conteúdo Orgânico", priority: "p3", badge: "P3",
        keywords: [
          { text: "o que é conteúdo orgânico", intent: "info", funnel: "tofu" },
          { text: "conteúdo orgânico para Instagram", intent: "info", funnel: "tofu" },
          { text: "crescer no Instagram sem impulsionar", intent: "info", funnel: "tofu" },
        ]
      },
      {
        label: "Orgânico vs Tráfego Pago", priority: "p3", badge: "P3",
        keywords: [
          { text: "tráfego orgânico vs tráfego pago", intent: "comp", funnel: "tofu" },
          { text: "parar de depender de ads", intent: "info", funnel: "mofu" },
          { text: "ROI do conteúdo orgânico", intent: "comp", funnel: "mofu" },
          { text: "marketing sem anúncio pago", intent: "info", funnel: "tofu" },
        ]
      },
      {
        label: "Posicionamento Digital", priority: "p3", badge: "P3",
        keywords: [
          { text: "posicionamento digital para especialistas", intent: "info", funnel: "tofu" },
          { text: "como se posicionar no Instagram", intent: "info", funnel: "tofu" },
          { text: "marca pessoal para profissionais liberais", intent: "info", funnel: "mofu" },
          { text: "posicionamento de marca pessoal", intent: "info", funnel: "mofu" },
        ]
      },
      {
        label: "Agência de Conteúdo", priority: "p3", badge: "P3",
        keywords: [
          { text: "agência de conteúdo orgânico", intent: "comp", funnel: "bofu" },
          { text: "agência de marketing nichado", intent: "comp", funnel: "bofu" },
          { text: "contratar agência de conteúdo para Instagram", intent: "trans", funnel: "bofu" },
          { text: "Open Mídia Digital", intent: "trans", funnel: "bofu" },
        ]
      },
      {
        label: "Materiais Gratuitos", priority: "p4", badge: "P4",
        keywords: [
          { text: "prompts para criação de conteúdo", intent: "info", funnel: "mofu" },
          { text: "modelo de linha editorial grátis", intent: "trans", funnel: "mofu" },
          { text: "checklist de conteúdo para Instagram", intent: "trans", funnel: "mofu" },
          { text: "ebook marketing para especialistas", intent: "trans", funnel: "mofu" },
          { text: "guia de conteúdo orgânico para iniciantes", intent: "info", funnel: "tofu" },
        ]
      }
    ]
  },
  {
    label: "Nicho & Personas", priority: "p2", badge: "P2",
    keywords: [
      { text: "marketing para personal trainer", intent: "info", funnel: "mofu" },
      { text: "Instagram para professor de idiomas", intent: "info", funnel: "mofu" },
      { text: "marketing para psicólogo sem ferir CFP", intent: "info", funnel: "mofu" },
      { text: "conteúdo para nutricionista Instagram", intent: "info", funnel: "mofu" },
      { text: "marketing para advogado Instagram", intent: "info", funnel: "mofu" },
    ],
    subclusters: [
      {
        label: "Autoridade de Nicho", priority: "p3", badge: "P3",
        keywords: [
          { text: "como ser referência no Instagram", intent: "info", funnel: "tofu" },
          { text: "como construir autoridade digital", intent: "info", funnel: "tofu" },
          { text: "autoridade digital para personal trainer", intent: "info", funnel: "mofu" },
          { text: "autoridade digital para psicólogo", intent: "info", funnel: "mofu" },
          { text: "autoridade digital para professor de idiomas", intent: "info", funnel: "mofu" },
          { text: "marketing nichado para profissionais liberais", intent: "info", funnel: "mofu" },
        ]
      }
    ]
  },
  {
    label: "SEO", priority: "p3", badge: "P3",
    keywords: [
      { text: "SEO para Instagram", intent: "info", funnel: "tofu" },
      { text: "como aparecer no Google com conteúdo orgânico", intent: "info", funnel: "tofu" },
      { text: "palavras-chave no Instagram", intent: "info", funnel: "mofu" },
      { text: "hashtags estratégicas 2025", intent: "info", funnel: "tofu" },
      { text: "SEO para blog de especialistas", intent: "info", funnel: "mofu" },
    ],
    subclusters: [
      {
        label: "GEO — Generative Engine Optimization", priority: "p5", badge: "P5",
        keywords: [
          { text: "GEO generative engine optimization", intent: "info", funnel: "tofu" },
          { text: "otimizar conteúdo para ChatGPT e Gemini", intent: "info", funnel: "tofu" },
          { text: "como aparecer em respostas de IA", intent: "info", funnel: "mofu" },
        ]
      },
      {
        label: "AEO — Answer Engine Optimization", priority: "p5", badge: "P5",
        keywords: [
          { text: "AEO answer engine optimization", intent: "info", funnel: "tofu" },
          { text: "otimizar conteúdo para Perplexity", intent: "info", funnel: "tofu" },
          { text: "IA aplicada ao marketing de conteúdo", intent: "info", funnel: "tofu" },
        ]
      }
    ]
  },
];

const iLabel = { info:"Informacional", comp:"Comparativo", trans:"Transacional" };
const iClass = { info:"tag-info", comp:"tag-comp", trans:"tag-trans" };
const fLabel = { tofu:"TOFU", mofu:"MOFU", bofu:"BOFU" };
const fClass = { tofu:"tag-tofu", mofu:"tag-mofu", bofu:"tag-bofu" };

function makeKw(kw) {
  return `<div class="kw-item">
    <span class="kw-text">${kw.text}</span>
    <div class="kw-tags">
      <span class="tag ${iClass[kw.intent]}">${iLabel[kw.intent]}</span>
      <span class="tag ${fClass[kw.funnel]}">${fLabel[kw.funnel]}</span>
    </div>
  </div>`;
}

function makeSubcluster(sc) {
  const kwHtml = sc.keywords.map(makeKw).join('');
  return `<li class="sub-item">
    <button class="sub-btn ${sc.priority}">
      <span class="label">${sc.label}</span>
      <span class="right">
        <span class="badge">${sc.badge}</span>
        <span class="arrow">▶</span>
      </span>
    </button>
    <div class="sub-body">${kwHtml}</div>
  </li>`;
}

const list = document.getElementById('cluster-list');

data.forEach(c => {
  const kwHtml = c.keywords.map(makeKw).join('');
  const subHtml = c.subclusters
    ? `<ul class="sub-list">${c.subclusters.map(makeSubcluster).join('')}</ul>`
    : '';

  const li = document.createElement('li');
  li.className = 'cluster-item';
  li.innerHTML = `
    <button class="cluster-btn ${c.priority}">
      <span class="label">${c.label}</span>
      <span class="right">
        <span class="badge">${c.badge}</span>
        <span class="arrow">▶</span>
      </span>
    </button>
    <div class="cluster-body">
      ${kwHtml}
      ${subHtml}
    </div>`;
  list.appendChild(li);
});

// Toggle clusters
document.querySelectorAll('.cluster-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const body = btn.nextElementSibling;
    const isOpen = body.classList.contains('open');
    body.classList.toggle('open', !isOpen);
    btn.classList.toggle('open', !isOpen);
  });
});

// Toggle subclusters
document.querySelectorAll('.sub-btn').forEach(btn => {
  btn.addEventListener('click', e => {
    e.stopPropagation();
    const body = btn.nextElementSibling;
    const isOpen = body.classList.contains('open');
    body.classList.toggle('open', !isOpen);
    btn.classList.toggle('open', !isOpen);
  });
});
</script>
</body>
</html>
